<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Elegant Eventos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cormorant Garamond', serif;
    background: 
    url('https://png.pngtree.com/png-clipart/20221019/original/pngtree-gold-line-border-png-image_8709452.png'),
    #fffaf6;

background-size: 600px;
background-repeat: repeat;
background-position: center;
    color: #4a3f36;
    scroll-behavior: smooth;
}

/* HEADER */
header {
    background: #f7f1e6;
    text-align: center;
    padding: 25px;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    margin: 0;
    color: #bfa07f;
    text-shadow: 1px 1px 3px rgba(255, 215, 180, 0.4);
}

header p {
    color: #6e5e4c;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: center;
    gap: 40px;
    background: #fff8f2;
    padding: 15px;
    border-bottom: 2px solid #bfa07f;
}

nav a {
    text-decoration: none;
    color: #4a3f36;
    font-weight: 500;
}

nav a:hover {
    color: #bfa07f;
}

/* HERO */
.hero {
    height: 70vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff5e6;
    position: relative;

    /* ADDED FOR SLIDESHOW */
    background-size: cover;
    background-position: center;
    transition: background-image 1s ease-in-out;
}

.hero::after {
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    top:0; left:0;
    background: rgba(255,235,200,0.25);
    pointer-events:none;
}

.hero h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    text-shadow: 2px 2px 8px rgba(255, 215, 180, 0.5);
}

/* SECTIONS */
.section {
    padding: 50px 20px;
    max-width: 900px;
    margin: auto;
}

.section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    margin-bottom: 10px;
    text-align:center;
    color:#4a3f36;
    position:relative;
}

.section h2::after {
    content:'';
    position:absolute;
    width:50px;
    height:3px;
    background:#bfa07f;
    left:50%;
    transform:translateX(-50%);
    bottom:-10px;
}

.section h3 {
    margin-top:30px;
    color:#4a3f36;
}

.section p {
    line-height:1.8;
}

/* SERVICES POPUP */
#moreServicesContent {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:20px;
    max-width:500px;
    box-shadow:0 8px 30px rgba(191,160,127,0.25);
    z-index:1000;
    overflow-y:auto;
    max-height:80vh;
}

#overlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.4);
    z-index:999;
}

/* GALLERY */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    margin-top: 40px;
}

.gallery-grid img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    border-radius: 18px;
    cursor: pointer;
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
}

.lightbox img {
    display: block;
    max-width: 85%;
    max-height: 80%;
    margin: 5% auto;
}

.lightbox span {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 35px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
<h1>The Elegant Eventos</h1>
<p>Curating Luxury Weddings & Bespoke Experiences</p>
</header>

<nav>
<a href="#about">About</a>
<a href="#founder">Founder</a>
<a href="#services">Services</a>
<a href="#expertise">Expertise</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero">
<h2>Designing Timeless Indian Weddings with Elegance</h2>
</div>

<!-- YOUR CONTENT REMAINS SAME (skipped for brevity) -->

<script>
function openServices() {
    document.getElementById('moreServicesContent').style.display='block';
    document.getElementById('overlay').style.display='block';
}
function closeServices() {
    document.getElementById('moreServicesContent').style.display='none';
    document.getElementById('overlay').style.display='none';
}
</script>

<script>
function openLightbox(img) {
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = img.src;
}
function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

<!-- ✅ SLIDESHOW SCRIPT (FIXED + 14 IMAGES) -->
<script>
window.onload = function () {

const images = [
    "hero1.jpg",
    "hero2.jpg",
    "hero3.jpg",
    "hero4.jpg",
    "hero5.jpg",
    "hero6.jpg",
    "hero7.jpg",
    "hero8.jpg",
    "hero9.jpg",
    "hero10.jpg",
    "hero11.jpg",
    "hero12.jpg",
    "hero13.jpg",
    "hero14.jpg"
];

let i = 0;
const hero = document.querySelector(".hero");

/* show first image instantly */
hero.style.backgroundImage = "url('hero1.jpg')";

function changeBackground() {
    hero.style.backgroundImage = "url('" + images[i] + "')";
    i = (i + 1) % images.length;
}

setInterval(changeBackground, 4000);

};
</script>

</body>
</html>
