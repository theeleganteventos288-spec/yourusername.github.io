<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Elegant Eventos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cormorant Garamond', serif;
    background: #fffaf6;
    color: #4a3f36;
    scroll-behavior: smooth;
}

/* HEADER */
header {
    background: #f7f1e6;
    text-align: center;
    padding: 25px;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    margin: 0;
    color: #bfa07f;
    text-shadow: 1px 1px 3px rgba(255, 215, 180, 0.4);
}

header p {
    color: #6e5e4c;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: center;
    gap: 40px;
    background: #fff8f2;
    padding: 15px;
    border-bottom: 2px solid #bfa07f;
}

nav a {
    text-decoration: none;
    color: #4a3f36;
    font-weight: 500;
}

nav a:hover {
    color: #bfa07f;
}

/* HERO */
.hero {
    height: 70vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff5e6;
    position: relative;
    background: url('https://raw.githubusercontent.com/theeleganteventos288-spec/yourusername.github.io/main/admin/wedding.jpg') center/cover no-repeat;
}

.hero::after {
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    top:0; left:0;
    background: rgba(255,235,200,0.25);
    pointer-events:none;
}

.hero h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    text-shadow: 2px 2px 8px rgba(255, 215, 180, 0.5);
}

/* SECTIONS */
.section {
    padding: 80px 20px;
    max-width: 900px;
    margin: auto;
}

.section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    margin-bottom: 10px;
    text-align:center;
    color:#4a3f36;
    position:relative;
}

.section h2::after {
    content:'';
    position:absolute;
    width:50px;
    height:3px;
    background:#bfa07f;
    left:50%;
    transform:translateX(-50%);
    bottom:-10px;
}

/* ⭐ NEW: GALLERY CSS (ADDED ONLY) */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.gallery-grid img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    border-radius: 18px;
    transition: 0.4s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.gallery-grid img:hover {
    transform: scale(1.07);
}

/* (REST OF YOUR ORIGINAL CSS REMAINS SAME) */
</style>
</head>

<body>

<header>
<h1>The Elegant Eventos</h1>
<p>Curating Luxury Weddings & Bespoke Experiences</p>
</header>

<nav>
<a href="#about">About</a>
<a href="#founder">Founder</a>
<a href="#services">Services</a>
<a href="#expertise">Expertise</a>

<!-- ⭐ ADDED -->
<a href="#gallery">Gallery</a>

<a href="#contact">Contact</a>
</nav>

<div class="hero">
<h2>Designing Timeless Indian Weddings with Elegance</h2>
</div>

<!-- KEEP ALL YOUR DATA EXACTLY SAME -->

<!-- ⭐ NEW GALLERY (ADDED ONLY, NOTHING REMOVED) -->
<div class="section" id="gallery">
<h2>Our Work</h2>

<div class="gallery-grid">
<img src="images/img1.jpg">
<img src="images/img2.jpg">
<img src="images/img3.jpg">
<img src="images/img4.jpg">
<img src="images/img5.jpg">
</div>

</div>

<!-- REST OF YOUR CODE CONTINUES EXACTLY SAME -->

</body>
</html>
